name: DingTalk Daily Learning

on:
  schedule:
    # Beijing time 13:00 = UTC 05:00.
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check required DingTalk secret
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_WEBHOOKS: ${{ secrets.DINGTALK_WEBHOOKS }}
        run: |
          if [ -z "$DINGTALK_WEBHOOK" ] && [ -z "$DINGTALK_WEBHOOKS" ]; then
            echo "::error::DINGTALK_WEBHOOK or DINGTALK_WEBHOOKS is empty. Please add one of them in Settings -> Secrets and variables -> Actions -> Repository secrets."
            exit 1
          fi

      - name: Validate DingTalk config
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_WEBHOOKS: ${{ secrets.DINGTALK_WEBHOOKS }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          LEARNING_START_DATE: ${{ vars.LEARNING_START_DATE || '2026-06-15' }}
          LEARNING_TITLE: ${{ vars.LEARNING_TITLE }}
          LEARNING_RANDOM_SEED: ${{ vars.LEARNING_RANDOM_SEED || 'dingtalk-daily-learning' }}
          AT_MOBILES: ${{ vars.AT_MOBILES }}
          IS_AT_ALL: ${{ vars.IS_AT_ALL }}
        run: python dingtalk_daily_learning_bot.py --validate-config

      - name: Validate knowledge points JSON
        run: python dingtalk_daily_learning_bot.py --validate-points

      - name: Send daily knowledge point
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_WEBHOOKS: ${{ secrets.DINGTALK_WEBHOOKS }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          LEARNING_START_DATE: ${{ vars.LEARNING_START_DATE || '2026-06-15' }}
          LEARNING_TITLE: ${{ vars.LEARNING_TITLE }}
          LEARNING_RANDOM_SEED: ${{ vars.LEARNING_RANDOM_SEED || 'dingtalk-daily-learning' }}
          AT_MOBILES: ${{ vars.AT_MOBILES }}
          IS_AT_ALL: ${{ vars.IS_AT_ALL }}
        run: python dingtalk_daily_learning_bot.py
